include current-theme.conf

# Můžeš přepsat na "grid", pokud chceš přesnou symetrickou mřížku
enabled_layouts grid

font_family      family='Hurmit Nerd Font' postscript_name=HurmitNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto

window_padding_width 5
tab_bar_style slant
enable_audio_bell no
notify_on_cmd_finish unfocused
background_opacity 0.6

# 1. Zavírání oken
map ctrl+w close_window

# 2. Automatický split ve stejném adresáři (layout si to organizuje sám)
map ctrl+enter launch --cwd=current

# 3. Pohyb mezi okny (pouze Ctrl + šipky)
map ctrl+up neighboring_window up
map ctrl+down neighboring_window down
map ctrl+left neighboring_window left
map ctrl+right neighboring_window right
